<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Layout classification fixture</title>
    <style>
      body { margin: 0; font-family: sans-serif; }
      .sticky-header { position: sticky; top: 0; height: 50px; background: #333; color: #fff; }
      .fixed-cta { position: fixed; bottom: 10px; right: 10px; background: #06a; color: #fff; padding: 8px; }
      .clip-box { overflow: hidden; width: 200px; height: 100px; position: relative; }
      .clipped-child { position: absolute; left: 500px; top: 0; width: 50px; height: 50px; background: red; }
      .inside-child { width: 50px; height: 50px; background: green; }
      .pushed-away { transform: translateY(5000px); height: 40px; background: yellow; }
      .spacer { height: 3000px; }
      .below-only { color: purple; padding: 20px; }
    </style>
  </head>
  <body>
    <header class="sticky-header">Sticky</header>
    <button class="fixed-cta">CTA</button>
    <div class="clip-box">
      <div class="inside-child"></div>
      <div class="clipped-child"></div>
    </div>
    <div class="pushed-away">Transformed away</div>
    <div class="spacer"></div>
    <footer class="below-only">Below</footer>
  </body>
</html>
