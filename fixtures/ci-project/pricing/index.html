<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CI project — pricing</title>
    <style>
      body { margin: 0; font-family: sans-serif; }
      .nav { height: 56px; background: #0b5fff; color: #fff; padding: 16px; }

      .plan { flex: 1; background: #f7f7f7; border: 1px solid #ddd; padding: 16px; }
      .plan .amount { font-size: 28px; font-weight: bold; color: #123456; }
      .spacer { height: 1500px; }
      .footer { height: 180px; background: #222; color: #eee; padding: 24px; }
    </style>
  </head>
  <body>
    <nav class="nav">Pricing</nav>
    <section class="plans">
      <div class="plan"><span class="amount">$9</span></div>
      <div class="plan"><span class="amount">$29</span></div>
      <div class="plan"><span class="amount">$99</span></div>
    </section>
    <div class="spacer"></div>
    <footer class="footer">Below-fold footer</footer>
  </body>
</html>
