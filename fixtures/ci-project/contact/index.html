<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CI project — contact</title>
    <style>
      body { margin: 0; font-family: sans-serif; }
      .nav { height: 56px; background: #0b5fff; color: #fff; padding: 16px; }
      .contact-hero { height: 220px; background: #6a1b9a; color: #fff; padding: 24px; }
      .contact-hero h1 { font-size: 32px; margin: 0; }
      form { padding: 16px; }
      form input, form textarea { display: block; width: 100%; margin-bottom: 12px; }
      .spacer { height: 1400px; }
      .footer { height: 180px; background: #222; color: #eee; padding: 24px; }
    </style>
  </head>
  <body>
    <nav class="nav">Contact</nav>
    <header class="contact-hero"><h1>Get in touch</h1></header>
    <form><input type="email" /><textarea></textarea></form>
    <div class="spacer"></div>
    <footer class="footer">Below-fold footer</footer>
  </body>
</html>
